<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dokumenty na stiahnutie</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 40px 20px;
            background-color: #e6f7ed; /* Svetlozelená farba pre sekciu dokumentov */
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #1e4620;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        a {
            color: #2b7a4b;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
        }
        a:hover {
            text-decoration: underline;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Zoznam dokumentov</h1>
    <ul id="zoznam-suborov">
        <li class="loading">Načítavam dokumenty...</li>
    </ul>
</div>

<script>
    // Nastavenie tvojich údajov pre GitHub API
    const uzivatel = "suppoodbory";
    const repozitar = "suppoodbory.github.io"; 
    const priecinok = "dokumenty";

    const url = `https://api.github.com/repos/${uzivatel}/${repozitar}/contents/${priecinok}`;

    fetch(url)
        .then(response => response.json())
        .then(data => {
            const zoznam = document.getElementById('zoznam-suborov');
            zoznam.innerHTML = ''; // Vymaže text "Načítavam..."

            // Vyfiltrujeme len PDF súbory
            const pdfSubory = data.filter(subor => subor.name.endsWith('.pdf'));

            if (pdfSubory.length === 0) {
                zoznam.innerHTML = '<li>Žiadne dokumenty neboli nájdené.</li>';
                return;
            }

            // Automatické vytvorenie odkazov
            pdfSubory.forEach(subor => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                
                // Nastavenie cesty k súboru na tvojom webe
                a.href = `https://${uzivatel}.github.io/${priecinok}/${subor.name}`;
                a.textContent = subor.name; // Zobrazí názov súboru
                a.target = "_blank"; // Otvorí v novom okne
                
                li.appendChild(a);
                zoznam.appendChild(li);
            });
        })
        .catch(error => {
            console.error('Chyba pri načítaní:', error);
            document.getElementById('zoznam-suborov').innerHTML = '<li>Nepodarilo sa načítať dokumenty.</li>';
        });
</script>

</body>
</html>
